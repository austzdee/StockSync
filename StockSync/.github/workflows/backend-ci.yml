name: Backend CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  backend-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore StockSync.slnx

      - name: Build backend
        run: dotnet build StockSync.slnx --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test StockSync.slnx --configuration Release --no-build --verbosity normal